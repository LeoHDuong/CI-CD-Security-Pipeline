variables:
  - group: acr-credentials

trigger:
  branches:
    include:
      - main
      - feature/*

pr:
  branches:
    include:
      - main

stages:
  - stage: SecretScanning
    displayName: Secret Scanning
    jobs:
      - job: GitLeaks
        displayName: GitLeaks Scan
        pool:
          name: local-agent
        steps:
          - checkout: self
            fetchDepth: 0        # full history scan

          - script: |
              docker run --rm -v $(pwd):/repo \
                zricethezav/gitleaks:latest \
                detect --source /repo \
                       --config /repo/.gitleaks.toml \
                       --verbose \
                       --exit-code 1
            displayName: Run GitLeaks
            # exit-code 1 = pipeline fails if secrets found → blocks merge

      - job: TruffleHog
        displayName: TruffleHog Scan
        pool:
          name: local-agent
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              docker run --rm -v $(pwd):/repo \
                trufflesecurity/trufflehog:latest \
                git file:///repo --only-verified --fail
            displayName: Run TruffleHog
            # --fail = non-zero exit if secrets found

  - stage: SAST
    displayName: SAST Scan
    dependsOn: SecretScanning
    jobs:
      - job: SASTFrontend
        displayName: Semgrep – Frontend (TypeScript)
        pool:
          name: local-agent
        steps:
          - checkout: self

          - script: |
              docker run --rm -v $(pwd):/src \
                semgrep/semgrep:latest \
                semgrep scan \
                  --config=p/typescript \
                  --config=p/javascript \
                  --config=p/react \
                  --error \
                  --json-output=/src/semgrep-frontend.json \
                  /src/frontend || true
              docker run --rm -v $(pwd):/src \
                semgrep/semgrep:latest \
                semgrep scan \
                  --config=p/typescript \
                  --config=p/javascript \
                  --config=p/react \
                  --error \
                  /src/frontend
            displayName: Run Semgrep on Frontend
            # --error = non-zero exit if any findings → blocks merge

          - task: PublishBuildArtifacts@1
            displayName: Publish Frontend SAST Report
            condition: always()
            inputs:
              pathToPublish: semgrep-frontend.json
              artifactName: sast-frontend-report

      - job: SASTBackend
        displayName: Semgrep – Backend (C#)
        pool:
          name: local-agent
        steps:
          - checkout: self

          - script: |
              docker run --rm -v $(pwd):/src \
                semgrep/semgrep:latest \
                semgrep scan \
                  --config=p/csharp \
                  --config=p/owasp-top-ten \
                  --error \
                  --json-output=/src/semgrep-backend.json \
                  /src/backend || true
              docker run --rm -v $(pwd):/src \
                semgrep/semgrep:latest \
                semgrep scan \
                  --config=p/csharp \
                  --config=p/owasp-top-ten \
                  --error \
                  /src/backend
            displayName: Run Semgrep on Backend
            # --error = non-zero exit if any findings → blocks merge

          - task: PublishBuildArtifacts@1
            displayName: Publish Backend SAST Report
            condition: always()
            inputs:
              pathToPublish: semgrep-backend.json
              artifactName: sast-backend-report

  - stage: BuildAndTest
    displayName: Build and Test
    dependsOn: SAST
    jobs:
      - job: BackendBuildTest
        displayName: Backend Build and Test
        pool:
          name: local-agent
        steps:
          - checkout: self

          - script: |
              docker run --rm \
                -v $(pwd):/app \
                -v $(Agent.TempDirectory)/nuget-packages:/root/.nuget/packages \
                -w /app \
                mcr.microsoft.com/dotnet/sdk:8.0 \
                dotnet restore ./backend/MyApp.Api/MyApp.Api.csproj
            displayName: Restore dependencies

          - script: |
              docker run --rm \
                -v $(pwd):/app \
                -v $(Agent.TempDirectory)/nuget-packages:/root/.nuget/packages \
                -w /app \
                mcr.microsoft.com/dotnet/sdk:8.0 \
                dotnet build ./backend/MyApp.Api/MyApp.Api.csproj --no-restore
            displayName: Build backend

          - script: |
              docker run --rm \
                -v $(pwd):/app \
                -v $(Agent.TempDirectory)/nuget-packages:/root/.nuget/packages \
                -w /app \
                mcr.microsoft.com/dotnet/sdk:8.0 \
                dotnet test ./backend/MyApp.Api/Tests/Tests.csproj --no-build
            displayName: Run tests

  - stage: DependencyScanning
    displayName: Dependency Scanning
    dependsOn: BuildAndTest
    jobs:
      - job: Trivy
        displayName: Trivy Dependency Scan
        pool:
          name: local-agent
        steps:
          - checkout: self

          - script: |
              docker run --rm -v $(pwd):/repo \
                ghcr.io/aquasecurity/trivy:latest \
                fs /repo \
                --exit-code 1 \
                --severity HIGH,CRITICAL
            displayName: Run Trivy

  - stage: ContainerBuild
    displayName: Build and Push Container
    dependsOn: DependencyScanning
    jobs:
      - job: DockerBuildPushBackend
        displayName: Build and Push Backend to ACR
        pool:
          name: local-agent
        steps:
          - checkout: self

          - script: |
              docker login $(ACR_LOGIN_SERVER) \
                --username $(ACR_USERNAME) \
                --password $(ACR_PASSWORD)
            displayName: Login to ACR

          - script: |
              docker build \
                -t $(ACR_LOGIN_SERVER)/myapp-api:$(Build.BuildId) \
                -t $(ACR_LOGIN_SERVER)/myapp-api:latest \
                -f backend/MyApp.Api/Dockerfile \
                ./backend/MyApp.Api
            displayName: Build Backend Docker image

          - script: |
              docker push $(ACR_LOGIN_SERVER)/myapp-api:$(Build.BuildId)
              docker push $(ACR_LOGIN_SERVER)/myapp-api:latest
            displayName: Push Backend to ACR

      - job: DockerBuildPushFrontend
        displayName: Build and Push Frontend to ACR
        pool:
          name: local-agent
        steps:
          - checkout: self

          - script: |
              docker login $(ACR_LOGIN_SERVER) \
                --username $(ACR_USERNAME) \
                --password $(ACR_PASSWORD)
            displayName: Login to ACR

          - script: |
              docker build \
                -t $(ACR_LOGIN_SERVER)/myapp-frontend:$(Build.BuildId) \
                -t $(ACR_LOGIN_SERVER)/myapp-frontend:latest \
                -f frontend/Dockerfile \
                ./frontend
            displayName: Build Frontend Docker image

          - script: |
              docker push $(ACR_LOGIN_SERVER)/myapp-frontend:$(Build.BuildId)
              docker push $(ACR_LOGIN_SERVER)/myapp-frontend:latest
            displayName: Push Frontend to ACR

  - stage: ContainerScan
    displayName: Container Image Vulnerability Scan
    dependsOn: ContainerBuild
    jobs:
      - job: TrivyScanBackend
        displayName: Trivy Scan – Backend Image
        pool:
          name: local-agent
        steps:
          - checkout: none

          - script: |
              docker login $(ACR_LOGIN_SERVER) \
                --username $(ACR_USERNAME) \
                --password $(ACR_PASSWORD)
            displayName: Login to ACR

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(Agent.TempDirectory)/trivy-cache:/root/.cache/trivy \
                ghcr.io/aquasecurity/trivy:latest \
                image \
                --exit-code 1 \
                --severity HIGH,CRITICAL \
                --format table \
                $(ACR_LOGIN_SERVER)/myapp-api:$(Build.BuildId)
            displayName: Scan Backend Image for Vulnerabilities
            # exit-code 1 = pipeline fails if HIGH/CRITICAL CVEs found

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(Agent.TempDirectory)/trivy-cache:/root/.cache/trivy \
                ghcr.io/aquasecurity/trivy:latest \
                image \
                --exit-code 0 \
                --severity HIGH,CRITICAL \
                --format json \
                $(ACR_LOGIN_SERVER)/myapp-api:$(Build.BuildId) \
                > $(Build.ArtifactStagingDirectory)/trivy-backend.json || true
            displayName: Export Backend Scan Report (JSON)
            condition: always()

          - task: PublishBuildArtifacts@1
            displayName: Publish Backend Trivy Report
            condition: always()
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/trivy-backend.json
              artifactName: trivy-backend-report

      - job: TrivyScanFrontend
        displayName: Trivy Scan – Frontend Image
        pool:
          name: local-agent
        steps:
          - checkout: none

          - script: |
              docker login $(ACR_LOGIN_SERVER) \
                --username $(ACR_USERNAME) \
                --password $(ACR_PASSWORD)
            displayName: Login to ACR

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(Agent.TempDirectory)/trivy-cache:/root/.cache/trivy \
                ghcr.io/aquasecurity/trivy:latest \
                image \
                --exit-code 1 \
                --severity HIGH,CRITICAL \
                --format table \
                $(ACR_LOGIN_SERVER)/myapp-frontend:$(Build.BuildId)
            displayName: Scan Frontend Image for Vulnerabilities

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(Agent.TempDirectory)/trivy-cache:/root/.cache/trivy \
                ghcr.io/aquasecurity/trivy:latest \
                image \
                --exit-code 0 \
                --severity HIGH,CRITICAL \
                --format json \
                $(ACR_LOGIN_SERVER)/myapp-frontend:$(Build.BuildId) \
                > $(Build.ArtifactStagingDirectory)/trivy-frontend.json || true
            displayName: Export Frontend Scan Report (JSON)
            condition: always()

          - task: PublishBuildArtifacts@1
            displayName: Publish Frontend Trivy Report
            condition: always()
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/trivy-frontend.json
              artifactName: trivy-frontend-report